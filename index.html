<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تحميل تطبيق القرآن الكريم</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 18px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
    }

    .card {
      background: #1e293b;
      margin: 30px auto;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📱 تطبيق القرآن الكريم</h1>
    <p>اقرأ واستمع للقرآن بسهولة وبدون إنترنت</p>

    <!-- زر التحميل -->
    <a href="https://www.mediafire.com/file/th08ec8wgc54ma8/app.apk/file" class="btn">
      ⬇ تحميل التطبيق
    </a>

    <div class="card">
      <h2>✨ مميزات التطبيق</h2>
      <p>✔ عرض السور بشكل جميل</p>
      <p>✔ تشغيل صوتيات</p>
      <p>✔ تصميم مريح للعين</p>
    </div>

    <div class="card">
      <h2>⚠ ملاحظة</h2>
      <p>قد تحتاج لتفعيل "تثبيت من مصادر غير معروفة"</p>
    </div>

    <footer>
      © 2026 - Ali Omar
    </footer>
  </div>

</body>
</html>
